name: generate animation

on:
  # rodar automaticamente a cada 24 horas
  schedule:
    - cron: "0 */24 * * *" 
  
  # permite rodar manualmente a qualquer momento
  workflow_dispatch:
  
  # roda a cada push na branch main
  push:
    branches:
    - main

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # gera o jogo da cobrinha com as cores personalizadas
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: deborahmotaa
          outputs: |
            dist/github-contribution-grid-snake.svg?color_dots=#ebedf0,#f5eada,#e6ccb2,#b08968,#7f5539&color_snake=#9c6644
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_dots=#161b22,#f5eada,#e6ccb2,#b08968,#7f5539&color_snake=#9c6644
          
      # envia o conteúdo para a branch 'output'
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
